<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark text-light">
    <header>
        <div class="text-center mt-3">
            <h1 class="mb-3">Meet our team</h1>
            <p class="mx-5">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nobis inventore possimus suscipit
                recusandae
                velit minus iure facere sapiente eligendi blanditiis doloremque veritatis quasi nostrum nemo, deleniti
                ipsum saepe voluptatibus debitis.</p>
        </div>
    </header>
    <main>
        <!-- Lista membri -->
        <div class="container mt-5">
            <div class="row row-cols-sm-1 row-cols-md-2 row-cols-lg-3 g-4" id="cards-container">
                <!-- Iniettare qui le schede da JS -->

            </div>
        </div>
        <!-- Form -->
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow-sm border-0 bg-dark text-white p-4">
                        <h2 class="h4 fw-bold mb-4 text-center text-uppercase ls-wide">Add New Member</h2>

                        <form id="team-form">
                            <div class="mb-3">
                                <label for="name" class="form-label small text-secondary">Nome Completo</label>
                                <input type="text" class="form-control form-control-sm bg-secondary text-white border-0"
                                    id="name" required>
                            </div>

                            <div class="mb-3">
                                <label for="role" class="form-label small text-secondary">Ruolo</label>
                                <input type="text" class="form-control form-control-sm bg-secondary text-white border-0"
                                    id="role">
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label small text-secondary">Indirizzo Email</label>
                                <input type="email"
                                    class="form-control form-control-sm bg-secondary text-white border-0" id="email"
                                    required>
                            </div>

                            <div class="mb-4">
                                <label for="img" class="form-label small text-secondary">URL Immagine</label>
                                <input type="text" class="form-control form-control-sm bg-secondary text-white border-0"
                                    id="img">
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-info fw-bold text-uppercase">Aggiungi al
                                    Team</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="scripts/teams.js"></script>
    <script src="scripts/script.js"></script>
</body>

</html>
